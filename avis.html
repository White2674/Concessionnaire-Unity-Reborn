<!DOCTYPE html>
<html lang="fr" class="scroll-smooth bg-black text-gray-200">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Avis Clients | L'Auto Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top, #001a22 0%, #000000 70%); }
    .tech-font { font-family: 'Orbitron', sans-serif; }
    .nav-shadow { backdrop-filter: blur(15px); background-color: rgba(0, 0, 0, 0.8); border-bottom: 1px solid rgba(0, 240, 255, 0.2); }
    .glass-card { background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(0, 240, 255, 0.1); transition: all 0.3s ease; }
    .glass-card:hover { border-color: #00f0ff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.1); }
  </style>
</head>
<body>

<header id="header" class="fixed top-0 left-0 w-full z-50 py-4 px-6 md:px-12 transition-all duration-300">
  <nav class="max-w-7xl mx-auto flex justify-between items-center">
    <a href="index.html" class="flex items-center gap-3">
      <img src="https://i.goopics.net/u2rl1l.png" alt="Logo" class="w-10 h-10 rounded border border-cyan-500/30" />
      <span class="text-white text-xl font-bold tracking-tighter tech-font uppercase">L'Auto <span class="text-cyan-400">Elite</span></span>
    </a>
    <div class="hidden md:flex gap-8 text-sm font-semibold uppercase tracking-widest text-gray-400">
      <a href="index.html" class="hover:text-cyan-400 transition">Accueil</a>
      <a href="catalogue.html" class="hover:text-cyan-400 transition">Catalogue</a>
      <a href="avis.html" class="text-cyan-400 underline decoration-cyan-500 underline-offset-8">Avis</a>
      <a href="equipe.html" class="hover:text-cyan-400 transition">Équipe</a>
      <a href="contact.html" class="hover:text-cyan-400 transition">Contact</a>
    </div>
  </nav>
</header>

<main class="pt-32 pb-20 px-4 max-w-7xl mx-auto">
  <h1 class="text-5xl md:text-6xl font-black tech-font text-white mb-12 text-center uppercase tracking-tighter">
    Retours <span class="text-cyan-400 text-glow">Expérience</span>
  </h1>

  <!-- Note globale -->
  <section class="max-w-2xl mx-auto glass-card rounded-2xl p-8 mb-12 text-center relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-1 bg-cyan-500"></div>
    <h2 class="tech-font text-sm tracking-[0.3em] text-gray-500 mb-4 uppercase">Satisfaction Client</h2>
    <div id="globalRating" class="text-5xl font-black text-cyan-400 drop-shadow-[0_0_10px_rgba(0,240,255,0.5)]">
      <!-- Injecté par JS -->
    </div>
  </section>

  <!-- Recherche -->
  <section class="mb-12">
    <div class="max-w-3xl mx-auto relative">
      <input id="searchInput" type="text" placeholder="FILTRER PAR NOM, MESSAGE OU EMPLOYÉ..." 
             class="w-full bg-black/40 border border-white/10 rounded-xl p-5 text-white placeholder-gray-600 focus:border-cyan-500 outline-none transition tech-font text-xs tracking-widest" />
      <div class="absolute right-5 top-5 text-cyan-500/50 italic text-xs tech-font">SEARCH_DB</div>
    </div>
  </section>

  <!-- Liste des avis -->
  <section id="avisList" class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
    <!-- Injecté par JS -->
  </section>
</main>

<footer class="text-center py-10 text-gray-600 text-xs tracking-[0.5em] tech-font border-t border-white/5 uppercase">
  &copy; 2026 L'Auto Elite | All rights reserved
</footer>

<script>
  const avis = [
    { nom: "Allen Zayn", date: "27 Avril 2026", message: "C'est la meilleure direction que j'ai jamais vu !", note: 5, employe: "Lewis Thompson" },
    { nom: "Sophie Martin", date: "28 Avril 2026", message: "Ils méritent de reprendre l'entreprise tellement ils sont bons", note: 5, employe: "Teeway Beckers" },
    { nom: "Alexandre Leroy", date: "29 Avril 2026", message: "Très réactif, professionnel et courtois.", note: 5, employe: "Jimmy Wanks" },
  ];

  function stars(n) {
    return '★'.repeat(n) + '<span class="text-gray-800">' + '★'.repeat(5-n) + '</span>';
  }

  function renderAvis(data) {
    const list = document.getElementById("avisList");
    const global = document.getElementById("globalRating");
    list.innerHTML = "";

    if (data.length === 0) {
      list.innerHTML = `<p class="col-span-full text-center text-gray-600 tech-font py-20">AUCUNE DONNÉE TROUVÉE</p>`;
      global.innerHTML = `<span class="text-lg">-- / 5</span>`;
      return;
    }

    data.forEach(a => {
      list.innerHTML += `
        <article class="glass-card rounded-2xl p-6 flex flex-col justify-between group">
          <div>
            <div class="flex justify-between items-start mb-4">
              <h3 class="tech-font text-white text-lg group-hover:text-cyan-400 transition">${a.nom}</h3>
              <div class="text-cyan-400 text-xs">${stars(a.note)}</div>
            </div>
            <p class="text-gray-400 text-sm italic mb-4">"${a.message}"</p>
          </div>
          <div class="border-t border-white/5 pt-4 mt-4">
            <p class="text-[10px] text-gray-500 tech-font uppercase tracking-tighter">Conseiller : <span class="text-gray-300">${a.employe}</span></p>
            <p class="text-[9px] text-cyan-900 font-bold mt-1 uppercase">${a.date}</p>
          </div>
        </article>
      `;
    });

    const moyenne = (data.reduce((s, a) => s + a.note, 0) / data.length).toFixed(1);
    global.innerHTML = `${moyenne} <span class="text-sm text-gray-500 tracking-normal font-light">/ 5.0</span>`;
  }

  document.getElementById("searchInput").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    renderAvis(avis.filter(a => a.nom.toLowerCase().includes(q) || a.message.toLowerCase().includes(q) || a.employe.toLowerCase().includes(q)));
  });

  window.addEventListener('scroll', () => {
    const h = document.getElementById('header');
    window.scrollY > 10 ? h.classList.add('nav-shadow') : h.classList.remove('nav-shadow');
  });

  renderAvis(avis);
</script>
</body>
</html>
