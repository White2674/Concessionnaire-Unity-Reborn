<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avis Clients | L'Auto Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0d; color: #ffffff; }
        .header-gradient {
            background: linear-gradient(180deg, rgba(20,20,20,0) 0%, #0d0d0d 100%), 
                        url('https://images.unsplash.com/photo-1562141961-b5d1942d4d27?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }
        .stats-panel { background: #151515; border: 1px solid #222; }
        .review-card { background: #1a1a1a; border: 1px solid #252525; transition: all 0.3s ease; }
        .review-card:hover { border-color: #ff4d4d; transform: translateY(-5px); }
        .input-dark { background: #151515; border: 1px solid #252525; color: white; outline: none; }
        .input-dark:focus { border-color: #ff4d4d; }
        .text-coral { color: #ff4d4d; }
        .bg-coral { background-color: #ff4d4d; }
        
        /* Modal Style */
        #modalAvis { backdrop-filter: blur(8px); display: none; }
    </style>
</head>
<body>

    <!-- Navigation (Identique à ton catalogue) -->
    <nav class="flex justify-between items-center px-12 py-6 bg-black/80 backdrop-blur-lg fixed w-full z-50 border-b border-white/5">
        <div class="text-xl font-extrabold uppercase tracking-tighter">L'Auto <span class="text-coral">Elite</span></div>
        <div class="hidden md:flex space-x-10 text-[11px] font-bold uppercase tracking-[0.2em] text-gray-400">
            <a href="index.html" class="hover:text-white transition">Accueil</a>
            <a href="catalogue.html" class="hover:text-white transition">Occasions</a>
            <a href="avis.html" class="text-white border-b-2 border-coral pb-1">Avis</a>
            <a href="equipe.html" class="hover:text-white transition">Équipe</a>
        </div>
        <button class="bg-coral hover:bg-red-700 text-white px-8 py-2.5 rounded-full text-[10px] font-black uppercase transition shadow-lg shadow-red-900/20">Connexion</button>
    </nav>

    <!-- Hero Section -->
    <header class="header-gradient pt-48 pb-24 px-6 text-center">
        <h1 class="text-coral text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4">Paroles de <span class="text-white">Clients</span></h1>
        <p class="max-w-xl mx-auto text-gray-400 text-sm font-medium leading-relaxed">Retrouvez l'expérience de nos membres "Elite".</p>
    </header>

    <!-- Dashboard Statistiques Réel -->
    <section class="max-w-5xl mx-auto px-6 -mt-12 relative z-10">
        <div class="stats-panel rounded-[2rem] p-10 shadow-2xl flex flex-col md:flex-row items-center justify-between gap-8">
            <div class="text-center md:text-left">
                <span class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 text-center md:text-left">Note de satisfaction</span>
                <div class="flex items-center gap-4">
                    <span id="moyenneNombre" class="text-6xl font-black text-white leading-none">0.0</span>
                    <div>
                        <div id="moyenneEtoiles" class="text-coral text-xl tracking-tighter"></div>
                        <span id="totalAvisLabel" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">BASÉ SUR 0 AVIS</span>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 w-full max-w-sm">
                <input id="searchInput" type="text" placeholder="RECHERCHER..." class="w-full input-dark rounded-2xl py-4 px-6 text-xs font-bold uppercase tracking-widest">
            </div>

            <button onclick="toggleModal()" class="bg-white/5 hover:bg-white/10 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase transition border border-white/10">
                Laisser un avis
            </button>
        </div>
    </section>

    <!-- Grille des Avis -->
    <main class="max-w-7xl mx-auto px-6 py-24">
        <div id="avisList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Injecté par JS -->
        </div>
    </main>

    <!-- Modal pour ajouter un avis -->
    <div id="modalAvis" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60">
        <div class="bg-[#151515] w-full max-w-lg rounded-[2.5rem] p-10 border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black uppercase mb-6">Partager mon <span class="text-coral">expérience</span></h2>
            <form id="formAvis" class="space-y-4">
                <input type="text" id="formNom" placeholder="VOTRE NOM" required class="w-full input-dark rounded-xl p-4 text-xs font-bold uppercase">
                <select id="formNote" class="w-full input-dark rounded-xl p-4 text-xs font-bold uppercase cursor-pointer">
                    <option value="5">★★★★★ (5/5)</option>
                    <option value="4">★★★★☆ (4/5)</option>
                    <option value="3">★★★☆☆ (3/5)</option>
                    <option value="2">★★☆☆☆ (2/5)</option>
                    <option value="1">★☆☆☆☆ (1/5)</option>
                </select>
                <textarea id="formMessage" placeholder="VOTRE MESSAGE..." rows="4" required class="w-full input-dark rounded-xl p-4 text-xs font-bold uppercase"></textarea>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="toggleModal()" class="flex-1 bg-white/5 text-gray-400 py-4 rounded-xl text-[10px] font-black uppercase transition">Annuler</button>
                    <button type="submit" class="flex-1 bg-coral text-white py-4 rounded-xl text-[10px] font-black uppercase transition shadow-lg shadow-red-900/40 hover:bg-red-600">Publier l'avis</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Base de données initiale
        let avisData = [
            { nom: "Zayn Allen", date: "27 AVRIL 2026", message: "Une expérience d'achat inégalée. L'équipe est d'un professionnalisme rare.", note: 5, collaborateur: "Lewis Thompson" },
            { nom: "Sophia Martin", date: "28 AVRIL 2026", message: "J'ai trouvé la voiture de mes rêves. Service parfait.", note: 5, collaborateur: "Teeway Beckers" },
            { nom: "Marc Vasseur", date: "29 AVRIL 2026", message: "Le suivi après-vente est correct, mais un peu d'attente.", note: 4, collaborateur: "Jimmy Wanks" }
        ];

        function getStars(n) {
            return '<span class="text-coral">' + '★'.repeat(n) + '</span>' + '<span class="text-[#333]">' + '★'.repeat(5-n) + '</span>';
        }

        function updateStats() {
            const total = avisData.length;
            const somme = avisData.reduce((acc, a) => acc + a.note, 0);
            const moyenne = total > 0 ? (somme / total).toFixed(1) : "0.0";

            document.getElementById('moyenneNombre').innerText = moyenne;
            document.getElementById('moyenneEtoiles').innerHTML = getStars(Math.round(moyenne));
            document.getElementById('totalAvisLabel').innerText = `BASÉ SUR ${total} AVIS`;
        }

        function renderAvis(items) {
            const container = document.getElementById('avisList');
            container.innerHTML = items.map(a => `
                <article class="review-card rounded-[2.5rem] p-8 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-white font-extrabold text-lg tracking-tight block">${a.nom}</span>
                            <span class="text-coral font-black text-[9px] uppercase">${a.date}</span>
                        </div>
                        <div class="text-lg">${getStars(a.note)}</div>
                    </div>
                    <p class="text-gray-400 text-sm leading-relaxed mb-8 flex-grow font-medium">"${a.message}"</p>
                    <div class="text-[9px] font-black text-gray-600 uppercase tracking-widest border-t border-white/5 pt-4">
                        Conseiller : <span class="text-gray-300">${a.collaborateur || "Équipe Elite"}</span>
                    </div>
                </article>
            `).join('');
            updateStats();
        }

        // Gestion du Modal
        function toggleModal() {
            const modal = document.getElementById('modalAvis');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        // Ajout d'un avis via le formulaire
        document.getElementById('formAvis').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nouvelAvis = {
                nom: document.getElementById('formNom').value,
                note: parseInt(document.getElementById('formNote').value),
                message: document.getElementById('formMessage').value,
                date: new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase(),
                collaborateur: "Direction"
            };

            avisData.unshift(nouvelAvis); // Ajoute au début de la liste
            renderAvis(avisData);
            toggleModal();
            e.target.reset(); // Vide le formulaire
        });

        // Recherche
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = avisData.filter(a => a.nom.toLowerCase().includes(q) || a.message.toLowerCase().includes(q));
            renderAvis(filtered);
        });

        // Premier rendu
        renderAvis(avisData);
    </script>
</body>
</html>
